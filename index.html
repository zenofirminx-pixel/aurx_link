<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>AX3D Streaming - True Binary Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Inter:wght@300;400;500;600&display=swap');
    :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --safe-top: env(safe-area-inset-top, 0px); }
    * { -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
    html, body { overscroll-behavior: none; position: fixed; width: 100%; height: 100%; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; overflow: hidden; }
   .logo-font { font-family: 'Orbitron', sans-serif; }
   .glass { background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
   .controller-btn { transition: all 0.08s; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1); }
   .controller-btn:active,.controller-btn.active { transform: scale(1.3); box-shadow: 0 0 30px currentColor; }
   .stick-area { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.4) 100%); box-shadow: inset 0 3px 12px rgba(0,0,0,0.6); }
   .stick-nub { transition: transform 0.03s linear; box-shadow: 0 3px 10px rgba(0,0,0,0.7), 0 0 25px rgba(99,102,241,0.5); }
    #gameCanvas { display: block; width: 100%; height: 100%; }
   .glow-text { text-shadow: 0 0 25px rgba(99, 102, 241, 0.6); }
    @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
   .slide-in { animation: slideIn 0.3s ease-out; }
   .game-card { transition: all 0.2s ease; cursor: pointer; }
   .game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3); }
    #menuPanel { transform: translateX(100%); transition: transform 0.3s; }
    #menuPanel.open { transform: translateX(0); }
    #controller { padding-bottom: calc(2rem + var(--safe-bottom)); background: rgba(10, 10, 15, 0.3)!important; backdrop-filter: blur(4px); }
    #controller.glass { background: transparent!important; backdrop-filter: none!important; border: none!important; box-shadow: none!important; }
    #loadingBar { transition: width 0.2s ease; }
</style>
</head>
<body class="text-gray-100">
    <div class="relative w-screen h-screen flex flex-col">

        <div id="homeScreen" class="absolute inset-0 z-40 flex flex-col bg-gradient-to-br from-[#0a0a0f] via-[#0f0f1a] to-[#0a0a0f]">
            <header class="glass px-6 py-4 flex items-center justify-between" style="padding-top: calc(1rem + var(--safe-top));">
                <div class="flex items-center gap-4">
                    <div class="logo-font text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-500 to-pink-500 glow-text">AX3D</div>
                    <div class="h-10 w-px bg-gray-700"></div>
                    <div>
                        <h1 class="logo-font text-2xl font-bold">Library</h1>
                        <p class="text-xs text-gray-500" id="gameCount">0 games</p>
                    </div>
                </div>
                <label for="gameFile" class="cursor-pointer px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 transition-all font-semibold shadow-lg shadow-indigo-500/30">
                    + Load .ax
                </label>
                <input type="file" id="gameFile" accept=".ax" class="hidden">
            </header>

            <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/80 z-50 flex flex-col items-center justify-center">
                <div class="logo-font text-6xl font-black text-indigo-500 mb-6">LOADING BINARY</div>
                <div class="w-80 h-2 bg-gray-800 rounded-full overflow-hidden">
                    <div id="loadingBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 w-0"></div>
                </div>
                <p class="text-sm text-gray-400 mt-4" id="loadingText">Parsing opcodes...</p>
            </div>

            <main class="flex-1 overflow-y-auto p-6">
                <div id="gameGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
                <div id="emptyLibrary" class="flex flex-col items-center justify-center h-full text-center">
                    <div class="logo-font text-9xl font-black text-gray-900 mb-6">AX</div>
                    <h2 class="text-3xl font-bold mb-3 text-gray-400">No Games Yet</h2>
                    <p class="text-gray-600 mb-8 max-w-md">Load a real binary .ax file. The compiler bytecodes will be interpreted directly.</p>
                </div>
            </main>
        </div>

        <div id="gameScreen" class="absolute inset-0 z-30 hidden flex-col">
            <div class="absolute left-0 right-0 z-50 p-4 flex justify-between pointer-events-none" style="top: calc(1rem + var(--safe-top));">
                <button data-key="Shift" class="controller-btn pointer-events-auto px-8 py-4 rounded-2xl bg-gray-900/90 text-base font-black border-2 border-indigo-500/40">LT</button>
                <button data-key="Control" class="controller-btn pointer-events-auto px-8 py-4 rounded-2xl bg-gray-900/90 text-base font-black border-2 border-indigo-500/40">RT</button>
            </div>

            <canvas id="gameCanvas"></canvas>

            <button id="menuBtn" class="absolute right-4 z-50 p-3 rounded-xl glass hover:bg-white/10 transition-all" style="top: calc(5.5rem + var(--safe-top));">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <div id="controller" class="glass absolute bottom-0 left-0 right-0 p-4 hidden slide-in">
                <div class="max-w-6xl mx-auto flex items-end justify-between gap-3 pb-5">
                    <div class="flex items-end gap-4">
                        <div id="leftStick" class="stick-area w-28 h-28 rounded-full relative cursor-pointer">
                            <div id="leftStickNub" class="stick-nub absolute w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
                        </div>
                        <div class="relative w-28 h-28 mb-4">
                            <button data-key="ArrowUp" class="controller-btn absolute top-0 left-1/2 -translate-x-1/2 w-10 h-10 rounded-lg bg-gray-800">↑</button>
                            <button data-key="ArrowLeft" class="controller-btn absolute left-0 top-1/2 -translate-y-1/2 w-10 h-10 rounded-lg bg-gray-800">←</button>
                            <button data-key="ArrowRight" class="controller-btn absolute right-0 top-1/2 -translate-y-1/2 w-10 h-10 rounded-lg bg-gray-800">→</button>
                            <button data-key="ArrowDown" class="controller-btn absolute bottom-0 left-1/2 -translate-x-1/2 w-10 h-10 rounded-lg bg-gray-800">↓</button>
                        </div>
                    </div>
                    <div class="flex items-end gap-4">
                        <div class="relative w-28 h-28 mb-4">
                            <button data-key="i" class="controller-btn absolute top-0 left-1/2 -translate-x-1/2 w-12 h-12 rounded-full bg-yellow-500 text-gray-900 font-black text-lg">Y</button>
                            <button data-key="j" class="controller-btn absolute left-0 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-blue-500 font-black text-lg">X</button>
                            <button data-key="l" class="controller-btn absolute right-0 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-red-500 font-black text-lg">B</button>
                            <button data-key="k" class="controller-btn absolute bottom-0 left-1/2 -translate-x-1/2 w-12 h-12 rounded-full bg-green-500 font-black text-lg">A</button>
                        </div>
                        <div id="rightStick" class="stick-area w-28 h-28 rounded-full relative cursor-pointer">
                            <div id="rightStickNub" class="stick-nub absolute w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="menuPanel" class="fixed top-0 right-0 h-full w-80 glass z-[60] p-6 flex flex-col">
            <div class="flex items-center justify-between mb-8" style="padding-top: var(--safe-top);">
                <h2 class="logo-font text-2xl font-bold">Game Menu</h2>
                <button id="closeMenu" class="p-2 rounded-lg hover:bg-white/10">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="flex-1 space-y-3">
                <button id="resetBtn" class="w-full p-4 rounded-xl glass hover:bg-white/10 transition-all flex items-center gap-3">
                    <span class="font-medium">Reset Game</span>
                </button>
            </div>
            <button id="quitBtn" class="w-full p-4 rounded-xl bg-red-600/20 hover:bg-red-600/30 border border-red-500/30 transition-all flex items-center justify-center gap-3 font-semibold" style="margin-bottom: var(--safe-bottom);">
                Quit to Library
            </button>
        </div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, currentGame = null, animationId = null;
        let virtualObjects = {};
        let gameLibrary = JSON.parse(localStorage.getItem('ax3d_library_bin_v2') || '[]');

        window.AX3D = {
            input: {
                keys: new Set(),
                leftStick: { x: 0, y: 0 },
                rightStick: { x: 0, y: 0 },
                buttons: { a: false, b: false, x: false, y: false, dpadUp: false, dpadDown: false, dpadLeft: false, dpadRight: false, lt: false, rt: false }
            }
        };

        function showLoading(text) {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loadingText').textContent = text;
        }

        function updateProgress(percent) {
            document.getElementById('loadingBar').style.width = percent + '%';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loadingBar').style.width = '0%';
        }

        function initRenderer() {
            const canvas = document.getElementById('gameCanvas');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0a0a0f, 1);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 15, 10);
            scene.add(dirLight);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            if (currentGame && currentGame.update) currentGame.update();
            renderer.render(scene, camera);
        }

        // --- DECODEUR DYNAMIQUE DE VRAI BINAIRE AX3D ---
        function loadBinaryGame(buffer) {
            if (animationId) cancelAnimationFrame(animationId);
            if (currentGame && currentGame.cleanup) currentGame.cleanup();
            
            while(scene.children.length > 0) scene.remove(scene.children[0]);
            virtualObjects = {};
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 15, 10);
            scene.add(dirLight);

            const view = new DataView(buffer);
            if (view.getUint32(0, false) !== 0x41583344) {
                alert("Erreur: Signature binaire AX3D invalide.");
                return;
            }

            let pc = 16; 
            let updateBlockStart = 16;
            let moveCommands = [];
            let cameraFollowTarget = null;

            // 1. Boucle d'initialisation (lit jusqu'à l'opcode de fin 0xFF)
            while (pc < buffer.byteLength) {
                let opcode = view.getUint8(pc);
                if (opcode === 0xFF) { 
                    pc++;
                    updateBlockStart = pc; 
                    break;
                }

                if (opcode === 0x01) { // CREATE_OBJECT
                    let objId = view.getUint8(pc + 1);
                    const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
                    const material = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4 });
                    const mesh = new THREE.Mesh(geometry, material);
                    scene.add(mesh);
                    virtualObjects[objId] = mesh;
                    pc += 3;
                } 
                else if (opcode === 0x02) { // POSITION
                    let objId = view.getUint8(pc + 1);
                    let x = view.getFloat32(pc + 2, true);
                    let y = view.getFloat32(pc + 6, true);
                    let z = view.getFloat32(pc + 10, true);
                    if (virtualObjects[objId]) virtualObjects[objId].position.set(x, y, z);
                    pc += 14;
                } 
                else if (opcode === 0x03) { // ROTATION
                    let objId = view.getUint8(pc + 1);
                    let x = view.getFloat32(pc + 2, true);
                    let y = view.getFloat32(pc + 6, true);
                    let z = view.getFloat32(pc + 10, true);
                    if (virtualObjects[objId]) virtualObjects[objId].rotation.set(x, y, z);
                    pc += 14;
                } 
                else if (opcode === 0x04) { // SCALE
                    let objId = view.getUint8(pc + 1);
                    let x = view.getFloat32(pc + 2, true);
                    let y = view.getFloat32(pc + 6, true);
                    let z = view.getFloat32(pc + 10, true);
                    if (virtualObjects[objId]) virtualObjects[objId].scale.set(x, y, z);
                    pc += 14;
                } 
                else if (opcode === 0x05) { // COLOR RGB (0-255)
                    let objId = view.getUint8(pc + 1);
                    let r = view.getUint8(pc + 2);
                    let g = view.getUint8(pc + 3);
                    let b = view.getUint8(pc + 4);
                    if (virtualObjects[objId]) {
                        virtualObjects[objId].material.color.setRGB(r / 255, g / 255, b / 255);
                    }
                    pc += 5;
                } 
                else {
                    pc++;
                }
            }

            // 2. Boucle du bloc de mise à jour (Update)
            pc = updateBlockStart;
            while (pc < buffer.byteLength) {
                let opcode = view.getUint8(pc);
                
                if (opcode === 0x06) { // MOVE PLAYER
                    let objId = view.getUint8(pc + 1);
                    moveCommands.push({ id: objId, type: 'player' });
                    pc += 2;
                } 
                else if (opcode === 0x0D) { // MOVE_AI
                    let objId = view.getUint8(pc + 1);
                    moveCommands.push({ id: objId, type: 'ai', seed: Math.random() * 100 });
                    pc += 2;
                } 
                else if (opcode === 0x0C) { // CAMERA_FOLLOW
                    cameraFollowTarget = view.getUint8(pc + 1);
                    pc += 2;
                } 
                else {
                    pc++;
                }
            }

            // 3. Moteur d'exécution actif
            currentGame = {
                update: function() {
                    const speed = 0.08;
                    
                    moveCommands.forEach(cmd => {
                        let mesh = virtualObjects[cmd.id];
                        if (!mesh) return;
                        
                        if (cmd.type === 'player') {
                            mesh.position.x += window.AX3D.input.leftStick.x * speed;
                            mesh.position.z += window.AX3D.input.leftStick.y * speed;
                            
                            if(window.AX3D.input.keys.has('ArrowLeft') || window.AX3D.input.keys.has('a')) mesh.position.x -= speed;
                            if(window.AX3D.input.keys.has('ArrowRight') || window.AX3D.input.keys.has('d')) mesh.position.x += speed;
                            if(window.AX3D.input.keys.has('ArrowUp') || window.AX3D.input.keys.has('w')) mesh.position.z -= speed;
                            if(window.AX3D.input.keys.has('ArrowDown') || window.AX3D.input.keys.has('s')) mesh.position.z += speed;
                        } 
                        else if (cmd.type === 'ai') {
                            let time = Date.now() * 0.002 + cmd.seed;
                            mesh.position.x += Math.sin(time) * 0.02;
                        }
                    });

                    if (cameraFollowTarget !== null && virtualObjects[cameraFollowTarget]) {
                        const targetPos = virtualObjects[cameraFollowTarget].position;
                        camera.position.set(targetPos.x, targetPos.y + 5, targetPos.z + 8);
                        camera.lookAt(targetPos.x, targetPos.y, targetPos.z);
                    }
                },
                cleanup: function() {
                    for (let id in virtualObjects) {
                        scene.remove(virtualObjects[id]);
                    }
                    virtualObjects = {};
                }
            };

            animate();
        }

        // --- GESTION DE LA BIBLIOTHEQUE ---
        function updateLibrary() {
            const grid = document.getElementById('gameGrid');
            const empty = document.getElementById('emptyLibrary');
            const count = document.getElementById('gameCount');
            if (gameLibrary.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'flex';
                count.textContent = '0 games';
                return;
            }
            empty.style.display = 'none';
            count.textContent = `${gameLibrary.length} game${gameLibrary.length > 1 ? 's' : ''}`;
            grid.innerHTML = gameLibrary.map((game, idx) => `
                <div class="game-card glass rounded-2xl p-4 flex flex-col" onclick="launchGame(${idx})">
                    <div class="aspect-square rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 mb-3 flex items-center justify-center">
                        <div class="logo-font text-5xl font-black text-white/20">AX</div>
                    </div>
                    <h3 class="font-bold text-sm mb-1 truncate">${game.name}</h3>
                    <p class="text-xs text-gray-500">${game.size} bytes • Binary Mode</p>
                </div>
            `).join('');
        }

        window.launchGame = (idx) => {
            const game = gameLibrary[idx];
            const binaryString = window.atob(game.rawBin);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            loadBinaryGame(bytes.buffer);
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('controller').style.display = 'block';
        };

        function quitToLibrary() {
            if (animationId) cancelAnimationFrame(animationId);
            if (currentGame && currentGame.cleanup) currentGame.cleanup();
            currentGame = null;
            document.getElementById('homeScreen').style.display = 'flex';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('controller').style.display = 'none';
            document.getElementById('menuPanel').classList.remove('open');
        }

        document.getElementById('gameFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            showLoading('Reading Bytecode...');
            updateProgress(40);

            try {
                const buffer = await file.arrayBuffer();
                updateProgress(80);

                let binary = '';
                const bytes = new Uint8Array(buffer);
                for (let i = 0; i < bytes.byteLength; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                const base64Bin = window.btoa(binary);

                gameLibrary.push({
                    name: file.name,
                    size: file.size,
                    rawBin: base64Bin
                });
                localStorage.setItem('ax3d_library_bin_v2', JSON.stringify(gameLibrary));
                updateLibrary();
                hideLoading();
                window.launchGame(gameLibrary.length - 1);

            } catch (err) {
                hideLoading();
                alert('Error: ' + err.message);
            }
        });

        document.getElementById('menuBtn').addEventListener('click', () => document.getElementById('menuPanel').classList.add('open'));
        document.getElementById('closeMenu').addEventListener('click', () => document.getElementById('menuPanel').classList.remove('open'));
        document.getElementById('quitBtn').addEventListener('click', quitToLibrary);
        document.getElementById('resetBtn').addEventListener('click', () => { if (gameLibrary.length > 0) window.launchGame(gameLibrary.length - 1); });

        // Contôles Manette & Clavier
        function setButtonState(key, pressed) {
            document.querySelectorAll(`[data-key="${key}"]`).forEach(btn => { if (pressed) btn.classList.add('active'); else btn.classList.remove('active'); });
            window.AX3D.input.keys[pressed ? 'add' : 'delete'](key);
        }
        window.addEventListener('keydown', (e) => setButtonState(e.key, true));
        window.addEventListener('keyup', (e) => setButtonState(e.key, false));

        document.querySelectorAll('[data-key]').forEach(btn => {
            const key = btn.dataset.key;
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); setButtonState(key, true); });
            btn.addEventListener('mouseup', () => setButtonState(key, false));
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); setButtonState(key, true); });
            btn.addEventListener('touchend', () => setButtonState(key, false));
        });

        function setupStick(stickId, nubId, inputTarget) {
            const stick = document.getElementById(stickId);
            const nub = document.getElementById(nubId);
            let active = false;
            function updateStick(clientX, clientY) {
                const rect = stick.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let deltaX = clientX - centerX;
                let deltaY = clientY - centerY;
                const dist = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                const maxDist = rect.width / 2 - 28;
                if (dist > maxDist) { deltaX = (deltaX / dist) * maxDist; deltaY = (deltaY / dist) * maxDist; }
                nub.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                window.AX3D.input[inputTarget].x = deltaX / maxDist;
                window.AX3D.input[inputTarget].y = deltaY / maxDist;
            }
            function resetStick() {
                nub.style.transform = 'translate(-50%, -50%)';
                window.AX3D.input[inputTarget].x = 0;
                window.AX3D.input[inputTarget].y = 0;
                active = false;
            }
            stick.addEventListener('mousedown', (e) => { active = true; updateStick(e.clientX, e.clientY); });
            stick.addEventListener('touchstart', (e) => { active = true; updateStick(e.touches[0].clientX, e.touches[0].clientY); });
            window.addEventListener('mousemove', (e) => { if (active) updateStick(e.clientX, e.clientY); });
            window.addEventListener('touchmove', (e) => { if (active) updateStick(e.touches[0].clientX, e.touches[0].clientY); });
            window.addEventListener('mouseup', resetStick);
            window.addEventListener('touchend', resetStick);
        }
        setupStick('leftStick', 'leftStickNub', 'leftStick');
        setupStick('rightStick', 'rightStickNub', 'rightStick');

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initRenderer();
        updateLibrary();
    </script>
</body>
</html>
